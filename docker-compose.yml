# ============================================================
# docker-compose.yml - Studypool Clone (3-Tier Architecture)
# Orchestrates: Frontend (Nginx) + Backend (PHP-FPM) + Database (MySQL)
# Tag: FA23-BCS-195
# ============================================================

services:
  # ---- Tier 1: Frontend (Nginx Reverse Proxy) ----
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: studypool-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    volumes:
      - ./studypool_clone/uploads:/var/www/html/uploads
    networks:
      - studypool-network
    restart: unless-stopped

  # ---- Tier 2: Backend (PHP-FPM Application Server) ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: studypool-backend
    image: quratulain5876/fa23-bcs-195:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root_password
      - DB_NAME=studypool_clone
    volumes:
      - ./studypool_clone/uploads:/var/www/html/uploads
    networks:
      - studypool-network
    restart: unless-stopped

  # ---- Tier 3: Database (MySQL 8.0) ----
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: studypool-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: studypool_clone
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - studypool-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# ---- Persistent Volumes ----
volumes:
  db_data:
    driver: local

# ---- Shared Network ----
networks:
  studypool-network:
    driver: bridge
