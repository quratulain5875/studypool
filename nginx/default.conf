# ============================================================
# Nginx Configuration - Studypool Clone Frontend
# Reverse proxies PHP requests to the backend PHP-FPM service
# ============================================================

server {
    listen 80;
    server_name localhost;

    # Document root for static files
    root /var/www/html;
    index index.php index.html;

    # Serve static files directly (CSS, JS, images)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # Proxy all PHP requests to the backend PHP-FPM container
    location ~ \.php$ {
        # Forward PHP processing to the backend service on port 9000
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
        include fastcgi_params;

        # Pass environment variables to PHP
        fastcgi_param DB_HOST     db;
        fastcgi_param DB_PORT     3306;
        fastcgi_param DB_USER     root;
        fastcgi_param DB_PASSWORD root_password;
        fastcgi_param DB_NAME     studypool_clone;
    }

    # Default location - try file, then directory, then PHP
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
