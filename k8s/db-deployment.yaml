apiVersion: apps/v1
kind: Deployment
metadata:
  name: studypool-db
  labels:
    app: studypool-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: studypool-db
  template:
    metadata:
      labels:
        app: studypool-db
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: mysql-root-password
        - name: MYSQL_DATABASE
          value: "studypool_clone"
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
        - name: db-init-script
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: mysql-data
        persistentVolumeClaim:
          claimName: mysql-pvc
      - name: db-init-script
        configMap:
          name: db-init-sql

